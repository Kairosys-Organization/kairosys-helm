{{- if .Values.pathfinderStudio.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: pathfinder-studio
  labels:
    app: pathfinder-studio
data:
{{- range $k, $v := .Values.pathfinderStudio.config }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
---
# Overrides the nginx default.conf baked into the studio image, replacing the
# hardcoded `ops-agent.pathfinder.svc.cluster.local:8080` upstream with a
# value so this chart can be installed in any namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pathfinder-studio-nginx
  labels:
    app: pathfinder-studio
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/x-javascript
            application/json
            application/xml
            application/xml+rss
            application/atom+xml
            image/svg+xml;

        location /studio/api/ {
            rewrite ^/studio/api/(.*)$ /api/$1 break;
            proxy_pass {{ .Values.pathfinderStudio.opsAgentUpstream }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /studio;
        }

        location /api/ {
            proxy_pass {{ .Values.pathfinderStudio.opsAgentUpstream }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location ^~ /studio/assets/ {
            rewrite ^/studio/(.*)$ /$1 break;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location ~* ^/studio/.*\.(mp4|webm|m4v|jpe?g|png|webp|gif|ico|woff2?|ttf|otf)$ {
            rewrite ^/studio/(.*)$ /$1 break;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            try_files $uri =404;
        }

        location = /studio {
            return 301 /studio/;
        }

        location /studio/ {
            rewrite ^/studio/(.*)$ /$1 break;
            try_files $uri $uri/ /index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathfinder-studio
  labels:
    app: pathfinder-studio
spec:
  replicas: {{ .Values.pathfinderStudio.replicaCount }}
  selector:
    matchLabels:
      app: pathfinder-studio
  template:
    metadata:
      labels:
        app: pathfinder-studio
      annotations:
        # Roll the pods when the nginx config changes
        checksum/nginx-config: {{ tpl (.Files.Get "templates/pathfinder-studio.yaml") . | sha256sum }}
    spec:
      containers:
        - name: pathfinder-studio
          image: "{{ .Values.pathfinderStudio.image.repository }}:{{ .Values.pathfinderStudio.image.tag }}"
          imagePullPolicy: {{ .Values.pathfinderStudio.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: pathfinder-studio
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources: {{- toYaml .Values.pathfinderStudio.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: pathfinder-studio-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: pathfinder-studio
  labels:
    app: pathfinder-studio
spec:
  type: NodePort
  selector:
    app: pathfinder-studio
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
{{- end }}

{{- if .Values.postgres.enabled }}
{{- if .Values.postgres.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  labels:
    app: postgres
type: Opaque
stringData:
{{- range $k, $v := .Values.postgres.secrets }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
---
{{- end }}
{{- if .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  labels:
    app: postgres
spec:
  accessModes:
    {{- range .Values.postgres.persistence.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size | quote }}
  {{- with .Values.postgres.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: {{ .Values.postgres.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      {{- if .Values.postgres.persistence.enabled }}
      securityContext:
        # fsGroup varies by image lineage:
        #   postgres:*-alpine        → 70 (BusyBox postgres user)
        #   postgres:* (Debian)      → 999
        #   pgvector/pgvector:pg*    → 999 (Debian-derived)
        # Configurable via values so switching images doesn't break volume perms.
        fsGroup: {{ .Values.postgres.fsGroup | default 70 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: postgres
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.dbUser | quote }}
                - -d
                - {{ .Values.postgres.dbName | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.dbUser | quote }}
                - -d
                - {{ .Values.postgres.dbName | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
          {{- if .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              # subPath dodges the "directory not empty" issue with EBS volumes
              # whose root contains a lost+found dir.
              subPath: postgres
          {{- end }}
      {{- if .Values.postgres.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
{{- end }}
